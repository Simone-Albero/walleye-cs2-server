<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WallEye Admin — {% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap">
  <link rel="stylesheet" href="/static/style.css">
  <meta name="csrf-token" content="[[ csrf_token ]]">
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
</head>
<body>
  <div id="shell">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-text">
          <span class="logo-wall">WALL</span><span class="logo-eye">EYE</span>
        </span>
      </div>

      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-link {% if active == 'dashboard' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          Dashboard
        </a>
        <a href="/config" class="nav-link {% if active == 'config' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M4.93 4.93a10 10 0 0 0 0 14.14"/><path d="M12 2v2m0 16v2M2 12h2m16 0h2"/></svg>
          Config
        </a>
        <a href="/admins" class="nav-link {% if active == 'admins' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87m-4-12a4 4 0 0 1 0 7.75"/></svg>
          Admins
        </a>
        <a href="/stats" class="nav-link {% if active == 'stats' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
          Stats
        </a>
        <a href="/bug-reports" class="nav-link {% if active == 'bug-reports' %}active{% endif %}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Bug Reports
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="/logout" onclick="event.preventDefault(); document.getElementById('logout-form').submit();" class="ext-link" title="Sign out">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Logout
        </a>
        <a href="http://localhost:8080" target="_blank" class="ext-link" title="Open leaderboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
          Leaderboard
        </a>
        <form id="logout-form" method="post" action="/logout" class="hidden-form">
          <input type="hidden" name="csrf_token" value="[[ csrf_token ]]">
        </form>
      </div>
    </aside>

    <!-- Content area -->
    <div class="page-content">
      <div class="page-header">
        <div>
          <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
          <p class="page-sub">{% block page_sub %}{% endblock %}</p>
        </div>
        <div class="page-header-actions">
          <span class="session-pill">Signed in as [[ current_user ]]</span>
        </div>
      </div>
      <main>
        {% block content %}{% endblock %}
      </main>
    </div>

  </div><!-- #shell -->

  <!-- Toast container -->
  <div id="toasts"></div>

  <script>
    async function apiFetch(url, method, body) {
      const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;
      const opts = {
        method: method || 'GET',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' }
      };
      if (csrfToken) opts.headers['X-CSRF-Token'] = csrfToken;
      if (body !== undefined) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);
      if (res.status === 401) {
        window.location.href = '/login?next=' + encodeURIComponent(window.location.pathname + window.location.search);
        return { ok: false, status: res.status, data: { error: 'authentication required' } };
      }
      return { ok: res.ok, status: res.status, data: await res.json().catch(() => ({})) };
    }

    function toast(msg, ok) {
      const wrap = document.getElementById('toasts');
      const t = document.createElement('div');
      t.className = 'toast ' + (ok !== false ? 'toast-ok' : 'toast-err');
      t.innerHTML = `<span class="toast-icon">${ok !== false ? '✓' : '✕'}</span><span>${msg}</span>`;
      wrap.appendChild(t);
      requestAnimationFrame(() => t.classList.add('toast-in'));
      setTimeout(() => {
        t.classList.remove('toast-in');
        setTimeout(() => t.remove(), 300);
      }, 3500);
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
