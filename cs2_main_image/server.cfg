
mp_autokick "0"

// Warmup managed by the plugin
mp_warmup_pausetimer "1"
mp_warmuptime "999"

// Match
// WallEye keeps this above config.json max_rounds so CS2 never opens the
// canonical match result panel before WallEye report/leaderboard phases.
mp_maxrounds "30"
mp_round_restart_delay "5"
mp_match_end_restart "0"
mp_match_restart_delay "300"
mp_match_can_clinch "0"

// Anti-afk
mp_idle_kick_timer "300"

// Log
log "on"
sv_logfile "1"
sv_log_onefile "0"
sv_logflush "0"
